<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Tagalog Kids — Learn Tagalog!</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --primary: #4A90E2;
      --secondary: #F5A623;
      --background: #FFF9E6;
      --text: #4A4A4A;
      --white: #FFFFFF;
    }
    body {
      font-family: 'Nunito', sans-serif;
      background: var(--background);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .container {
      background: var(--white);
      border-radius: 2rem;
      box-shadow: 0 8px 32px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 500px;
      padding: 3rem 2rem;
      text-align: center;
    }
    .logo {
      font-size: 4rem;
      margin-bottom: 0.5rem;
    }
    h1 {
      font-size: 2.5rem;
      font-weight: 800;
      color: var(--primary);
      margin-bottom: 0.5rem;
    }
    .subtitle {
      font-size: 1.2rem;
      color: var(--text);
      opacity: 0.7;
      margin-bottom: 2rem;
    }
    .grade-selector {
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
      margin-bottom: 2rem;
    }
    .grade-btn {
      background: var(--primary);
      color: var(--white);
      border: none;
      padding: 1rem 2rem;
      border-radius: 50px;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      font-family: 'Nunito', sans-serif;
      box-shadow: 0 4px 12px rgba(74,144,226,0.3);
    }
    .grade-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(74,144,226,0.4);
    }
    .grade-btn:active {
      transform: translateY(0);
    }
    .grade-btn small {
      display: block;
      font-weight: 400;
      font-size: 0.8rem;
      opacity: 0.8;
      margin-top: 0.3rem;
    }
    .stats {
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      margin-bottom: 2rem;
    }
    .stat {
      text-align: center;
    }
    .stat-value {
      font-size: 1.8rem;
      font-weight: 800;
      color: var(--secondary);
    }
    .stat-label {
      font-size: 0.8rem;
      opacity: 0.6;
    }
    .footer {
      font-size: 0.8rem;
      opacity: 0.5;
      margin-top: 1.5rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">🇵🇭</div>
    <h1>Tagalog Kids</h1>
    <p class="subtitle">Matutong mag-Tagalog! — Learn Tagalog!</p>

    <div class="stats">
      <div class="stat">
        <div class="stat-value" id="words-learned">0</div>
        <div class="stat-label">Words Learned</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="day-streak">0</div>
        <div class="stat-label">Day Streak</div>
      </div>
    </div>

    <div class="grade-selector">
      <a href="lesson.html" class="grade-btn" style="text-decoration:none;display:block">
        Grade 1 — Mga Pagbati
        <small>Greetings · 11 words</small>
      </a>
    </div>

    <p style="font-size: 0.9rem; opacity: 0.7;">More grades &amp; lessons coming soon!</p>
    <div class="footer">
      Made with ❤️ for kids learning Tagalog
    </div>
  </div>

  <script>
    // Load progress from localStorage
    try {
      const saved = localStorage.getItem('tagalog-kids-progress');
      if (saved) {
        const progress = JSON.parse(saved);
        const wordCount = Object.keys(progress.words || {}).length;
        document.getElementById('words-learned').textContent = wordCount || '0';
      }
    } catch(e) {}
  </script>
</body>
</html>
