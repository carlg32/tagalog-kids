<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tagalog Kids</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Nunito', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }
    .container {
      text-align: center;
      padding: 40px;
      max-width: 400px;
    }
    h1 {
      font-size: 2.8rem;
      margin-bottom: 10px;
    }
    .settings {
      background: rgba(255,255,255,0.15);
      padding: 20px;
      border-radius: 16px;
      margin: 30px 0;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
    }
    input {
      width: 80px;
      padding: 8px;
      border: none;
      border-radius: 8px;
      text-align: center;
      font-size: 1.1rem;
    }
    .start-btn {
      background: white;
      color: #667eea;
      border: none;
      padding: 16px 48px;
      font-size: 1.3rem;
      font-weight: 700;
      border-radius: 9999px;
      cursor: pointer;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      transition: transform 0.2s ease;
      margin-top: 10px;
    }
    .start-btn:hover {
      transform: translateY(-3px);
    }
    .dashboard-link {
      display: block;
      margin-top: 30px;
      color: white;
      text-decoration: none;
      opacity: 0.85;
    }
    .dashboard-link:hover {
      opacity: 1;
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🇵🇭 Tagalog Kids</h1>
    <p>Learn Tagalog the fun way!</p>

    <div class="settings">
      <label>Words per session</label>
      <input type="number" id="words-input" value="5" min="1" max="20">
    </div>

    <button class="start-btn" id="start-btn">Start Lesson</button>

    <a href="parent-dashboard.html" class="dashboard-link">Parent Dashboard</a>
  </div>

  <script>
    const input = document.getElementById('words-input');
    
    document.getElementById('start-btn').addEventListener('click', () => {
      const count = parseInt(input.value) || 5;
      window.location.href = `lesson-v2.html?words=${count}`;
    });
  </script>
</body>
</html>
