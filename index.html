<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tagalog Kids</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Nunito', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }
    .container {
      text-align: center;
      padding: 40px 20px;
    }
    h1 {
      font-size: 3rem;
      margin-bottom: 10px;
    }
    p {
      font-size: 1.3rem;
      margin-bottom: 50px;
      opacity: 0.9;
    }
    .start-btn {
      background: white;
      color: #667eea;
      border: none;
      padding: 18px 52px;
      font-size: 1.35rem;
      font-weight: 700;
      border-radius: 9999px;
      cursor: pointer;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      transition: all 0.3s ease;
    }
    .start-btn:hover {
      transform: translateY(-4px);
      box-shadow: 0 15px 40px rgba(0,0,0,0.3);
    }
    .dashboard-link {
      display: block;
      margin-top: 40px;
      color: white;
      text-decoration: none;
      font-size: 1.05rem;
      opacity: 0.85;
    }
    .dashboard-link:hover {
      opacity: 1;
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🇵🇭 Tagalog Kids</h1>
    <p>Learn Tagalog the fun way!</p>
    
    <button class="start-btn" id="start-btn">Start Lesson</button>
    
    <a href="parent-dashboard.html" class="dashboard-link">Parent Dashboard</a>
  </div>

  <script>
    document.getElementById('start-btn').addEventListener('click', () => {
      // Go directly without ?words param (loads all words)
      window.location.href = 'lesson-v2.html';
    });
  </script>
</body>
</html>
