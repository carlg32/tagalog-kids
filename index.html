<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tagalog Kids</title>
  <link rel="stylesheet" href="css/slide-v2.css">
  <style>
    body {
      font-family: 'Nunito', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
    }
    .start-container {
      text-align: center;
      color: white;
    }
    .start-btn {
      background: white;
      color: #667eea;
      border: none;
      padding: 16px 48px;
      font-size: 1.3rem;
      font-weight: 700;
      border-radius: 9999px;
      cursor: pointer;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      transition: transform 0.2s ease;
    }
    .start-btn:hover {
      transform: translateY(-3px);
    }
  </style>
</head>
<body>
  <div class="start-container">
    <h1>🇵🇭 Tagalog Kids</h1>
    <p>Learn Tagalog the fun way!</p>
    <button class="start-btn" id="start-btn">Start Lesson</button>
  </div>

  <script>
    function startSession() {
      // Go to lesson without ?words param so it loads all words
      window.location.href = 'lesson-v2.html';
    }
    
    document.getElementById('start-btn').addEventListener('click', startSession);
  </script>
</body>
</html>
