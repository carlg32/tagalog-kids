<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lesson - Tagalog Kids</title>
    <!-- NO CDN! All styles inline -->
    <style>
        body { 
            font-family: 'Comic Sans MS', Arial, sans-serif; 
            background: linear-gradient(to bottom right, #4CAF50, #2196F3); 
            min-height: 100vh; 
            padding: 20px; 
            margin: 0; 
        }
        .container { 
            max-width: 800px; 
            margin: 0 auto; 
            background: white; 
            border-radius: 20px; 
            padding: 30px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); 
        }
        h1 { 
            font-size: 32px; 
            color: #333; 
            margin-bottom: 10px; 
        }
        p { 
            color: #666; 
            font-size: 18px; 
            margin-bottom: 20px; 
        }
        .btn { 
            background: #4CAF50; 
            color: white; 
            border: none; 
            padding: 15px 30px; 
            border-radius: 10px; 
            font-size: 18px; 
            cursor: pointer; 
            margin: 10px; 
        }
        .btn:hover { 
            background: #45a049; 
        }
        .btn-back { 
            background: #9e9e9e; 
            font-size: 16px; 
            padding: 10px 20px; 
        }
        .btn-back:hover { 
            background: #757575; 
        }
        .progress-container { 
            width: 100%; 
            background: #e0e0e0; 
            border-radius: 10px; 
            height: 20px; 
            margin: 30px 0; 
        }
        .progress-bar { 
            background: #4CAF50; 
            height: 20px; 
            border-radius: 10px; 
            transition: width 0.5s ease; 
            width: 0%; 
        }
        .activity { 
            text-align: center; 
            padding: 30px; 
            background: #f5f5f5; 
            border-radius: 15px; 
            margin-top: 20px; 
        }
        .activity h2 { 
            font-size: 28px; 
            color: #333; 
            margin-bottom: 20px; 
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
            <div>
                <h1 id="lesson-title">Loading...</h1>
                <p id="lesson-description"></p>
            </div>
            <button class="btn btn-back" onclick="goHome()">← Back to Home</button>
        </div>

        <!-- Progress Bar -->
        <div class="progress-container">
            <div class="progress-bar" id="progress-bar"></div>
        </div>

        <!-- Activity Container -->
        <div id="activity-container">
            <p>Loading activities...</p>
        </div>
    </div>

    <script>
        // DEBUG: Alert when script starts
        alert('✅ JavaScript is running! lesson.html loaded.');

        // Get lesson ID from URL parameter
        const urlParams = new URLSearchParams(window.location.search);
        const lessonId = urlParams.get('id') || 'g1_l01';
        console.log('Lesson ID:', lessonId);

        // Lesson Data (embedded for prototype)
        const lessonData = {
            id: 'g1_l01',
            title: 'Mga Pagbati (Greetings)',
            description: 'Learn how to greet people in Tagalog!',
            activities: [
                {
                    id: 'activity_1',
                    type: 'vocabulary_intro',
                    title: '📚 Learn New Words',
                    instruction: 'Click the buttons to hear the words!'
                },
                {
                    id: 'activity_2',
                    type: 'quiz',
                    title: '🧠 Quiz Time!',
                    instruction: 'Answer the questions below:'
                }
            ]
        };

        // Initialize page
        document.getElementById('lesson-title').innerHTML = lessonData.title;
        document.getElementById('lesson-description').innerHTML = lessonData.description;
        
        // Show first activity
        showActivity(0);

        function showActivity(index) {
            const activity = lessonData.activities[index];
            const container = document.getElementById('activity-container');
            
            // Update progress bar
            const progress = ((index) / lessonData.activities.length) * 100;
            document.getElementById('progress-bar').style.width = progress + '%';
            
            if (activity.type === 'vocabulary_intro') {
                container.innerHTML = `
                    <div class="activity">
                        <h2>${activity.title}</h2>
                        <p>${activity.instruction}</p>
                        <button class="btn" onclick="alert('🔊 Playing audio for: kumusta')">🔊 Play "kumusta"</button>
                        <button class="btn" onclick="alert('🔊 Playing audio for: magandang umaga')">🔊 Play "magandang umaga"</button>
                        <button class="btn" onclick="nextActivity()" style="background: #2196F3;">Next Activity →</button>
                    </div>
                `;
            } else if (activity.type === 'quiz') {
                container.innerHTML = `
                    <div class="activity">
                        <h2>${activity.title}</h2>
                        <p>${activity.instruction}</p>
                        <p style="font-size: 24px; font-weight: bold; margin: 30px 0;">What does "kumusta" mean?</p>
                        <button class="btn" onclick="checkAnswer('wrong')" style="background: #FF9800;">Good morning</button>
                        <button class="btn" onclick="checkAnswer('correct')" style="background: #9C27B0;">How are you / Hello</button>
                        <button class="btn" onclick="checkAnswer('wrong')" style="background: #F44336;">Goodbye</button>
                    </div>
                `;
            }
        }

        function nextActivity() {
            alert('Moving to next activity...');
            showActivity(1);
        }

        function checkAnswer(result) {
            if (result === 'correct') {
                alert('✅ Correct! "Kumusta" means "How are you / Hello"');
                alert('🎉 Lesson complete! You earned 10 points!');
                goHome();
            } else {
                alert('❌ Incorrect. Try again!');
            }
        }

        function goHome() {
            window.location.href = 'index.html';
        }

        alert('✅ Page fully loaded! You should see the lesson title now.');
    </script>
</body>
</html>
