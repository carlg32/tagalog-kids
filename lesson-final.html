<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tagalog Kids - Lesson</title>
    <style>
        /* Inline CSS - No external dependencies */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: white; border-radius: 20px; padding: 30px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { color: #667eea; font-size: 2rem; margin-bottom: 10px; }
        .progress-bar { background: #e0e0e0; height: 10px; border-radius: 5px; margin: 20px 0; overflow: hidden; }
        .progress-fill { background: linear-gradient(90deg, #667eea, #764ba2); height: 100%; width: 0%; transition: width 0.5s ease; }
        .activity-section { display: none; }
        .activity-section.active { display: block; }
        .btn { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; padding: 15px 30px; border-radius: 10px; font-size: 1.1rem; cursor: pointer; margin: 10px; transition: transform 0.2s; }
        .btn:hover { transform: translateY(-2px); }
        .btn-success { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); }
        .btn-danger { background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%); }
        .quiz-option { display: block; width: 100%; text-align: left; margin: 10px 0; padding: 15px; }
        .feedback { padding: 20px; border-radius: 10px; margin: 20px 0; text-align: center; font-size: 1.2rem; }
        .feedback.correct { background: #d4edda; color: #155724; border: 2px solid #c3e6cb; }
        .feedback.incorrect { background: #f8d7da; color: #721c24; border: 2px solid #f5c6cb; }
        .hidden { display: none; }
        .loading { text-align: center; padding: 50px; font-size: 1.5rem; color: #667eea; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 id="lesson-title">Loading...</h1>
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
        </div>
        
        <div id="loading" class="loading">
            <p>🔄 Loading lesson...</p>
        </div>
        
        <div id="activity-vocabulary" class="activity-section">
            <h2>🔊 Listen and Learn</h2>
            <div id="vocabulary-list"></div>
            <button class="btn" onclick="nextActivity()">Next Activity →</button>
        </div>
        
        <div id="activity-quiz" class="activity-section">
            <h2>📝 Quiz Time!</h2>
            <div id="quiz-question"></div>
            <div id="quiz-options"></div>
            <div id="quiz-feedback" class="feedback hidden"></div>
            <button class="btn hidden" id="next-quiz-btn" onclick="nextQuizQuestion()">Next Question →</button>
        </div>
        
        <div id="activity-complete" class="activity-section">
            <h2>🎉 Lesson Complete!</h2>
            <p>Great job! You've finished this lesson.</p>
            <button class="btn btn-success" onclick="finishLesson()">← Back to Dashboard</button>
        </div>
    </div>

    <script>
        // =====================================================================
        // JAVASCRIPT - SYNTAX VERIFIED (no missing { errors)
        // =====================================================================
        
        alert("✅ JavaScript is running! lesson-final.html loaded.");
        
        // Lesson database (same as before)
        const lessonDatabase = {
            "g1_l01": {
                id: "g1_l01",
                title: "Mga Pagbati (Greetings)",
                grade: 1,
                vocabulary: [
                    { word: "kumusta", translation: "hello / how are you", audio: "kumusta.mp3" },
                    { word: "salamat", translation: "thank you", audio: "salamat.mp3" },
                    { word: "oo", translation: "yes", audio: "oo.mp3" },
                    { word: "hindi", translation: "no", audio: "hindi.mp3" }
                ],
                quiz: [
                    { question: "What does 'kumusta' mean?", options: ["Hello / How are you", "Goodbye", "Thank you", "Yes"], correct: 0 },
                    { question: "What does 'salamat' mean?", options: ["Hello", "Goodbye", "Thank you", "No"], correct: 2 }
                ]
            }
        };
        
        // State variables
        let currentLesson = null;
        let currentActivity = 0;
        let currentQuizIndex = 0;
        let score = 0;
        
        // Activities in order
        const activities = ["vocabulary", "quiz", "complete"];
        
        // =====================================================================
        // INITIALIZATION
        // =====================================================================
        
        function initLesson() {
            alert("🚀 initLesson() called!");
            
            // Get lesson ID from URL
            const urlParams = new URLSearchParams(window.location.search);
            const lessonId = urlParams.get("id");
            
            alert("📝 Lesson ID from URL: " + lessonId);
            
            if (!lessonId || !lessonDatabase[lessonId]) {
                alert("❌ Invalid lesson ID: " + lessonId);
                document.getElementById("lesson-title").textContent = "Error: Lesson not found";
                return;
            }
            
            // Load lesson
            currentLesson = lessonDatabase[lessonId];
            
            alert("✅ Lesson loaded: " + currentLesson.title);
            
            // Update UI
            document.getElementById("lesson-title").textContent = currentLesson.title;
            document.getElementById("loading").style.display = "none";
            
            // Start first activity
            showActivity(0);
        }
        
        // =====================================================================
        // ACTIVITY MANAGEMENT
        // =====================================================================
        
        function showActivity(index) {
            alert("🎯 showActivity(" + index + ")");
            
            // Hide all activities
            const sections = document.querySelectorAll(".activity-section");
            sections.forEach(function(section) {
                section.classList.remove("active");
            });
            
            // Show current activity
            const activityName = activities[index];
            const section = document.getElementById("activity-" + activityName);
            
            if (section) {
                section.classList.add("active");
                alert("✅ Showing activity: " + activityName);
            } else {
                alert("❌ Activity section not found: activity-" + activityName);
            }
            
            // Update progress bar
            const progress = (index / (activities.length - 1)) * 100;
            document.getElementById("progress-fill").style.width = progress + "%";
            
            // Load activity content
            if (activityName === "vocabulary") {
                loadVocabulary();
            } else if (activityName === "quiz") {
                loadQuiz();
            }
        }
        
        function nextActivity() {
            alert("➡️ nextActivity() called");
            currentActivity++;
            if (currentActivity >= activities.length) {
                alert("🏁 Lesson complete!");
                finishLesson();
            } else {
                showActivity(currentActivity);
            }
        }
        
        // =====================================================================
        // VOCABULARY ACTIVITY
        // =====================================================================
        
        function loadVocabulary() {
            alert("🔊 loadVocabulary() called");
            
            const list = document.getElementById("vocabulary-list");
            list.innerHTML = "";
            
            if (!currentLesson || !currentLesson.vocabulary) {
                alert("❌ No vocabulary data!");
                return;
            }
            
            currentLesson.vocabulary.forEach(function(vocab, index) {
                const item = document.createElement("div");
                item.style.cssText = "background: #f8f9fa; padding: 20px; margin: 10px 0; border-radius: 10px; border: 2px solid #e9ecef;";
                
                item.innerHTML = `
                    <h3 style="color: #667eea; font-size: 1.5rem; margin-bottom: 10px;">${vocab.word}</h3>
                    <p style="color: #666; margin-bottom: 15px;">${vocab.translation}</p>
                    <button class="btn" onclick="playAudio('${vocab.word}')">🔊 Play "${vocab.word}"</button>
                `;
                
                list.appendChild(item);
            });
            
            alert("✅ Vocabulary loaded: " + currentLesson.vocabulary.length + " words");
        }
        
        function playAudio(word) {
            alert("🔊 Playing audio for: " + word);
            // TODO: Actually play audio file
        }
        
        // =====================================================================
        // QUIZ ACTIVITY
        // =====================================================================
        
        function loadQuiz() {
            alert("📝 loadQuiz() called");
            currentQuizIndex = 0;
            score = 0;
            loadQuizQuestion();
        }
        
        function loadQuizQuestion() {
            alert("❓ loadQuizQuestion() - index: " + currentQuizIndex);
            
            if (!currentLesson || !currentLesson.quiz) {
                alert("❌ No quiz data!");
                return;
            }
            
            if (currentQuizIndex >= currentLesson.quiz.length) {
                alert("🏁 Quiz complete! Score: " + score + "/" + currentLesson.quiz.length);
                nextActivity();
                return;
            }
            
            const question = currentLesson.quiz[currentQuizIndex];
            
            // Show question
            document.getElementById("quiz-question").innerHTML = `
                <h3 style="color: #667eea; margin-bottom: 20px;">${question.question}</h3>
            `;
            
            // Show options
            const optionsDiv = document.getElementById("quiz-options");
            optionsDiv.innerHTML = "";
            
            question.options.forEach(function(option, index) {
                const btn = document.createElement("button");
                btn.className = "btn quiz-option";
                btn.textContent = option;
                btn.onclick = function() { checkAnswer(index); };
                optionsDiv.appendChild(btn);
            });
            
            // Hide feedback
            document.getElementById("quiz-feedback").classList.add("hidden");
            document.getElementById("next-quiz-btn").classList.add("hidden");
            
            alert("✅ Quiz question loaded: " + question.question);
        }
        
        function checkAnswer(selectedIndex) {
            alert("✔️ checkAnswer(" + selectedIndex + ") called");
            
            if (!currentLesson || !currentLesson.quiz) {
                alert("❌ No quiz data!");
                return;
            }
            
            const question = currentLesson.quiz[currentQuizIndex];
            const isCorrect = selectedIndex === question.correct;
            
            // Show feedback
            const feedback = document.getElementById("quiz-feedback");
            feedback.classList.remove("hidden");
            
            if (isCorrect) {
                feedback.className = "feedback correct";
                feedback.innerHTML = "✅ <strong>Correct!</strong>";
                score++;
                alert("✅ Correct! Score: " + score);
            } else {
                feedback.className = "feedback incorrect";
                feedback.innerHTML = "❌ <strong>Incorrect.</strong> The correct answer is: " + question.options[question.correct];
                alert("❌ Incorrect. Correct answer: " + question.options[question.correct]);
            }
            
            // Show next button
            document.getElementById("next-quiz-btn").classList.remove("hidden");
        }
        
        function nextQuizQuestion() {
            alert("➡️ nextQuizQuestion() called");
            currentQuizIndex++;
            loadQuizQuestion();
        }
        
        // =====================================================================
        // LESSON COMPLETION
        // =====================================================================
        
        function finishLesson() {
            alert("🎉 finishLesson() called! Final score: " + score + "/" + (currentLesson ? currentLesson.quiz.length : 0));
            
            // TODO: Save progress to localStorage or backend
            
            // Redirect to dashboard
            alert("↩️ Redirecting to dashboard...");
            window.location.href = "index-fixed.html";
        }
        
        // =====================================================================
        // START LESSON
        // =====================================================================
        
        alert("🚀 STARTING: Calling initLesson()...");
        initLesson();
        
    </script>
</body>
</html>
