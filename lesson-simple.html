<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lesson - Tagalog Kids (Simple)</title>
    <style>
        body { font-family: Arial; padding: 20px; background: #f0f0f0; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 10px; }
        h1 { color: #333; }
        .btn { background: #4CAF50; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; margin: 10px 0; }
        .btn:hover { background: #45a049; }
        .activity { margin: 20px 0; padding: 20px; background: #e3f2fd; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1 id="lesson-title">Loading...</h1>
        <p id="lesson-desc"></p>
        <div id="activity-area">
            <p>If you see this, the page loaded but JavaScript didn't run.</p>
        </div>
        <button class="btn" onclick="alert('Button works!')">Test Button</button>
    </div>

    <script>
        // Debug: Show when script starts
        console.log('=== LESSON PAGE LOADED ===');
        alert('JavaScript is running!');

        // Get lesson ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        const lessonId = urlParams.get('id');
        console.log('Lesson ID from URL:', lessonId);

        // Update page
        document.getElementById('lesson-title').innerHTML = 'Lesson: ' + (lessonId || 'g1_l01');
        document.getElementById('lesson-desc').innerHTML = 'This is a test lesson page.';

        // Show activity
        document.getElementById('activity-area').innerHTML = `
            <div class="activity">
                <h2>📚 Activity 1: Learn Words</h2>
                <p>Click the button below to hear the word:</p>
                <button class="btn" onclick="alert('🔊 Playing audio...')">🔊 Play Audio</button>
                <button class="btn" onclick="nextActivity()" style="background: #2196F3;">Next Activity →</button>
            </div>
        `;

        function nextActivity() {
            alert('Moving to next activity...');
            document.getElementById('activity-area').innerHTML = `
                <div class="activity">
                    <h2>🎯 Activity 2: Quiz</h2>
                    <p>What does "kumusta" mean?</p>
                    <button class="btn" onclick="checkAnswer('wrong')">Good morning</button>
                    <button class="btn" onclick="checkAnswer('correct')">How are you</button>
                </div>
            `;
        }

        function checkAnswer(result) {
            if (result === 'correct') {
                alert('✅ Correct!');
            } else {
                alert('❌ Wrong. Try again!');
            }
        }

        console.log('=== PAGE READY ===');
    </script>
</body>
</html>
