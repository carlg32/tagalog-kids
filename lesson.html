<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Tagalog Kids - Learn Greetings</title>
  <link rel="stylesheet" href="css/slide-v2.css">
  <link rel="stylesheet" href="css/animations.css?v=2">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <div class="slide-container" id="slide-container">
    
    <!-- Header: Progress + Mastery Badge -->
    <header class="slide-header">
      <div class="progress-container">
        <div class="progress-bar">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
        <div class="progress-info">
          <span class="progress-text" id="progress-text">1 / 11</span>
          <span class="mastery-badge" id="mastery-badge"></span>
        </div>
      </div>
    </header>

    <!-- Main Content: Illustration + Word -->
    <main class="slide-main">
      <div class="character-scene" id="character-scene">
        <img src="" alt="Illustration" class="illustration" id="illustration">
      </div>

      <div class="word-display">
        <h1 class="tagalog-word" id="tagalog-word">
          Kumusta
          <button class="sound-icon-btn" id="sound-icon-btn" aria-label="Play pronunciation">
            <span class="sound-icon">🔊</span>
          </button>
        </h1>
        <p class="english-translation" id="english-translation">"How are you?"</p>
      </div>

      <div class="example-sentence" id="example-sentence">
        <p class="tagalog-text"></p>
        <p class="english-text"></p>
      </div>
    </main>

    <!-- Footer: Navigation + End Session -->
    <footer class="slide-footer">
      <button class="nav-btn prev-btn" id="prev-btn">← Previous</button>
      <button class="end-btn" id="end-btn" style="display:none">🎉 Done! Back to Menu</button>
      <button class="nav-btn next-btn" id="next-btn">Next →</button>
    </footer>

  </div>

  <!-- Audio Player (hidden) -->
  <audio id="audio-player" preload="auto">
    <source src="" type="audio/mpeg">
  </audio>

  <!-- JavaScript -->
  <script src="js/word-selector.js"></script>
  <script src="js/slide-v2.js"></script>
</body>
</html>
