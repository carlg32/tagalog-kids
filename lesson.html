<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Tagalog Kids - Learn Greetings</title>
  <link rel="stylesheet" href="css/slide-v2.css">
  <link rel="stylesheet" href="css/animations.css?v=2">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <div class="slide-container" id="slide-container">
    
    <!-- Header: Progress + Phase Badge -->
    <header class="slide-header">
      <div class="progress-container">
        <div class="progress-bar">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
        <div class="progress-info">
          <span class="progress-text" id="progress-text">1 / 5</span>
          <span class="phase-badge" id="phase-badge">Learn</span>
        </div>
      </div>
    </header>

    <!-- ===== LEARN PHASE ===== -->
    <main class="slide-main" id="learn-section">
      <div class="character-scene" id="character-scene">
        <img src="" alt="Illustration" class="illustration" id="illustration">
      </div>
      <div class="word-display">
        <h1 class="tagalog-word" id="tagalog-word">
          Kumusta
          <button class="sound-icon-btn" id="sound-icon-btn" aria-label="Play pronunciation">
            <span class="sound-icon">🔊</span>
          </button>
        </h1>
        <p class="english-translation" id="english-translation">"How are you?"</p>
      </div>
      <div class="example-sentence" id="example-sentence">
        <p class="tagalog-text"></p>
        <p class="english-text"></p>
      </div>
    </main>

    <!-- ===== QUIZ PHASE (hidden during learn) ===== -->
    <main class="slide-main" id="quiz-section" style="display:none">
      <div class="quiz-icon" id="quiz-icon">📝</div>
      <div class="question-stem" id="question-stem">What does "Kumusta" mean?</div>
      <div class="choices" id="choices"></div>
      <div class="feedback" id="feedback"></div>
    </main>

    <!-- ===== CONGRATS SECTION (hidden) ===== -->
    <main class="slide-main" id="congrats-section" style="display:none">
      <div class="congrats-icon" id="congrats-icon">🎉</div>
      <div class="congrats-score" id="congrats-score">100%</div>
      <div class="congrats-message" id="congrats-message">Ang galing! Excellent!</div>
      <div class="congrats-detail" id="congrats-detail"></div>
      <a href="index.html" class="nav-btn" style="text-decoration:none;display:inline-block;padding:0.8rem 2rem;margin-top:1rem;">🏠 Back to Menu</a>
    </main>

    <!-- Footer: Previous (learn) + Next -->
    <footer class="slide-footer">
      <button class="nav-btn prev-btn" id="prev-btn" style="display:none">← Back</button>
      <button class="nav-btn next-btn" id="next-btn">Next →</button>
    </footer>

  </div>

  <!-- Audio Player (hidden) -->
  <audio id="audio-player" preload="auto">
    <source src="" type="audio/mpeg">
  </audio>

  <script src="js/word-selector.js"></script>
  <script src="js/quiz.js"></script>
  <script src="js/slide-v2.js"></script>
</body>
</html>
