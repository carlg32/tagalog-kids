<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lesson - Tagalog Kids</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Comic Sans MS', cursive; }
        .dragging { opacity: 0.5; }
        .drop-zone { border: 3px dashed #ccc; }
        .drop-zone.dragover { border-color: #4CAF50; background-color: #f0f8f0; }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-400 to-purple-500 min-h-screen p-8">
    <div class="max-w-4xl mx-auto bg-white rounded-2xl shadow-2xl p-8">
        <!-- Header -->
        <div class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-3xl font-bold text-gray-800" id="lesson-title">Loading...</h1>
                <p class="text-gray-600" id="lesson-description"></p>
            </div>
            <button onclick="goHome()" class="bg-gray-300 hover:bg-gray-400 px-4 py-2 rounded-lg">
                ← Back to Home
            </button>
        </div>

        <!-- Progress Bar -->
        <div class="w-full bg-gray-200 rounded-full h-6 mb-8">
            <div class="bg-green-500 h-6 rounded-full transition-all duration-500" id="progress-bar" style="width: 0%"></div>
        </div>

        <!-- Activity Container -->
        <div id="activity-container"></div>

        <!-- Completion Modal -->
        <div id="completion-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center">
            <div class="bg-white rounded-2xl p-8 max-w-md text-center">
                <div class="text-6xl mb-4">🎉</div>
                <h2 class="text-3xl font-bold mb-4">Lesson Complete!</h2>
                <p class="text-xl mb-4">Score: <span id="final-score">0</span>%</p>
                <p class="mb-8">Points earned: <span id="points-earned">0</span> ⭐</p>
                <button onclick="goHome()" class="bg-green-500 hover:bg-green-600 text-white font-bold py-3 px-8 rounded-lg text-xl">
                    Continue →
                </button>
            </div>
        </div>
    </div>

    <script>
        // Get lesson ID from URL parameter
        const urlParams = new URLSearchParams(window.location.search);
        const lessonId = urlParams.get('id') || 'g1_l01';

        // Lesson Data (embedded for prototype)
        const lessonDatabase = {
            'g1_l01': {
                id: 'g1_l01',
                title: 'Mga Pagbati (Greetings)',
                description: 'Learn how to greet people in Tagalog!',
                vocabulary: [
                    { word: 'kumusta', translation: 'how are you / hello', audio: '🔊' },
                    { word: 'magandang umaga', translation: 'good morning', audio: '🔊' },
                    { word: 'paalam', translation: 'goodbye', audio: '🔊' }
                ],
                activities: [
                    {
                        id: 'vocab_intro',
                        type: 'vocabulary_intro',
                        title: '📚 Learn New Words',
                        instruction: 'Listen to the audio and repeat the words!'
                    },
                    {
                        id: 'matching',
                        type: 'matching_game',
                        title: '🎯 Matching Game',
                        instruction: 'Drag the Tagalog word to the correct image!',
                        pairs: [
                            { word: 'kumusta', emoji: '👋' },
                            { word: 'magandang umaga', emoji: '🌅' },
                            { word: 'paalam', emoji: '👋' }
                        ]
                    },
                    {
                        id: 'quiz',
                        type: 'multiple_choice',
                        title: '🧠 Quiz Time!',
                        instruction: 'Choose the correct answer!',
                        questions: [
                            {
                                question: 'What does "kumusta" mean?',
                                choices: ['Good morning', 'How are you / Hello', 'Goodbye'],
                                correct: 'How are you / Hello'
                            },
                            {
                                question: 'How do you say "good morning" in Tagalog?',
                                choices: ['kumusta', 'magandang umaga', 'paalam'],
                                correct: 'magandang umaga'
                            }
                        ]
                    }
                ]
            }
        };

        const lessonData = lessonDatabase[lessonId] || lessonDatabase['g1_l01'];

        let currentActivity = 0;
        let score = 0;
        let totalQuestions = 0;
        let points = 0;

        // Initialize lesson
        document.getElementById('lesson-title').textContent = lessonData.title;
        document.getElementById('lesson-description').textContent = lessonData.description;
        showActivity(0);

        function showActivity(index) {
            currentActivity = index;
            const activity = lessonData.activities[index];
            const container = document.getElementById('activity-container');
            
            updateProgressBar();
            
            if (activity.type === 'vocabulary_intro') {
                showVocabularyIntro(container, activity);
            } else if (activity.type === 'matching_game') {
                showMatchingGame(container, activity);
            } else if (activity.type === 'multiple_choice') {
                showMultipleChoice(container, activity);
            }
        }

        function showVocabularyIntro(container, activity) {
            let vocabCards = lessonData.vocabulary.map(v => `
                <div class="bg-blue-100 p-6 rounded-lg mb-4">
                    <h3 class="text-3xl font-bold text-blue-800 mb-2">${v.word}</h3>
                    <p class="text-xl text-gray-700 mb-4">${v.translation}</p>
                    <button class="bg-blue-500 hover:bg-blue-600 text-white font-bold py-2 px-4 rounded-lg text-2xl">
                        ${v.audio} Play Audio
                    </button>
                </div>
            `).join('');

            container.innerHTML = `
                <div class="text-center">
                    <h2 class="text-2xl font-bold mb-4">${activity.title}</h2>
                    <p class="mb-8 text-gray-600">${activity.instruction}</p>
                    ${vocabCards}
                    <button onclick="nextActivity()" class="mt-8 bg-green-500 hover:bg-green-600 text-white font-bold py-3 px-8 rounded-lg text-xl">
                        Next Activity →
                    </button>
                </div>
            `;
        }

        function showMatchingGame(container, activity) {
            let pairs = activity.pairs;
            let shuffledWords = [...pairs].sort(() => Math.random() - 0.5);
            
            container.innerHTML = `
                <div>
                    <h2 class="text-2xl font-bold mb-4 text-center">${activity.title}</h2>
                    <p class="mb-8 text-gray-600 text-center">${activity.instruction}</p>
                    
                    <div class="grid grid-cols-2 gap-8">
                        <div>
                            <h3 class="font-bold mb-4">Drag these words:</h3>
                            ${shuffledWords.map(p => `
                                <div class="bg-yellow-100 p-4 mb-4 rounded-lg cursor-move text-center font-bold text-xl" 
                                     draggable="true" 
                                     ondragstart="drag(event)" 
                                     id="word-${p.word}">
                                    ${p.word}
                                </div>
                            `).join('')}
                        </div>
                        
                        <div>
                            <h3 class="font-bold mb-4">To these images:</h3>
                            ${pairs.map(p => `
                                <div class="bg-gray-100 p-8 mb-4 rounded-lg text-center text-4xl drop-zone" 
                                     ondragover="allowDrop(event)" 
                                     ondrop="drop(event, '${p.word}')" 
                                     id="drop-${p.word}">
                                    ${p.emoji}
                                    <div class="text-sm text-gray-600 mt-2">Drop here</div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                    
                    <div class="text-center mt-8">
                        <p class="text-lg">Matched: <span id="match-count">0</span> / ${pairs.length}</p>
                    </div>
                </div>
            `;
        }

        let matchedCount = 0;

        function allowDrop(ev) {
            ev.preventDefault();
            ev.target.classList.add('dragover');
        }

        function drag(ev) {
            ev.dataTransfer.setData("text", ev.target.id);
        }

        function drop(ev, correctWord) {
            ev.preventDefault();
            ev.target.classList.remove('dragover');
            const data = ev.dataTransfer.getData("text");
            const draggedWord = data.replace('word-', '');
            
            if (draggedWord === correctWord) {
                ev.target.innerHTML = '✅ Matched!';
                ev.target.classList.add('bg-green-100');
                document.getElementById(data).classList.add('opacity-50');
                document.getElementById(data).draggable = false;
                
                matchedCount++;
                document.getElementById('match-count').textContent = matchedCount;
                
                if (matchedCount === lessonData.activities[currentActivity].pairs.length) {
                    setTimeout(() => {
                        points += 20;
                        alert('🎯 Great job! +20 points!');
                        nextActivity();
                    }, 1000);
                }
            } else {
                alert('❌ Try again!');
            }
        }

        function showMultipleChoice(container, activity) {
            let currentQuestion = 0;
            let questionData = activity.questions[currentQuestion];
            
            function renderQuestion() {
                questionData = activity.questions[currentQuestion];
                container.innerHTML = `
                    <div>
                        <h2 class="text-2xl font-bold mb-4 text-center">${activity.title}</h2>
                        <p class="mb-8 text-gray-600 text-center">${activity.instruction}</p>
                        
                        <div class="bg-purple-100 p-8 rounded-lg mb-8 text-center">
                            <h3 class="text-2xl font-bold text-purple-800 mb-4">${questionData.question}</h3>
                        </div>
                        
                        <div class="grid grid-cols-1 gap-4">
                            ${questionData.choices.map((choice, i) => `
                                <button class="p-4 rounded-lg font-bold text-lg transition-all bg-gray-100 hover:bg-gray-200" 
                                        onclick="checkAnswer('${choice}', ${currentQuestion})" 
                                        id="choice-${i}">
                                    ${choice}
                                </button>
                            `).join('')}
                        </div>
                        
                        <div class="text-center mt-8">
                            <p>Question ${currentQuestion + 1} / ${activity.questions.length}</p>
                        </div>
                    </div>
                `;
            }
            
            window.checkAnswer = function(choice, questionIndex) => {
                totalQuestions++;
                const correct = choice === questionData.correct;
                
                if (correct) {
                    score += 100 / activity.questions.length;
                    points += 10;
                    document.getElementById(`choice-${questionData.choices.indexOf(choice)}`).classList.add('bg-green-500', 'text-white');
                    alert('✅ Correct! +10 points!');
                } else {
                    document.getElementById(`choice-${questionData.choices.indexOf(choice)}`).classList.add('bg-red-500', 'text-white');
                    alert(`❌ Incorrect. The correct answer is: ${questionData.correct}`);
                }
                
                setTimeout(() => {
                    if (currentQuestion < activity.questions.length - 1) {
                        currentQuestion++;
                        renderQuestion();
                    } else {
                        completeLesson();
                    }
                }, 1500);
            };
            
            renderQuestion();
        }

        function nextActivity() {
            if (currentActivity < lessonData.activities.length - 1) {
                showActivity(currentActivity + 1);
            } else {
                completeLesson();
            }
        }

        function completeLesson() {
            const finalScore = Math.round(score);
            document.getElementById('final-score').textContent = finalScore;
            document.getElementById('points-earned').textContent = points;
            document.getElementById('completion-modal').classList.remove('hidden');
            
            // Save progress
            localStorage.setItem('last-lesson-score', finalScore);
        }

        function goHome() {
            const score = parseInt(localStorage.getItem('last-lesson-score') || '0');
            if (score > 0) {
                // Call parent window function if exists
                if (window.opener && window.opener.completeLesson) {
                    window.opener.completeLesson('g1_l01', score, points);
                }
            }
            window.location.href = 'index.html';
        }

        function updateProgressBar() {
            const progress = ((currentActivity) / lessonData.activities.length) * 100;
            document.getElementById('progress-bar').style.width = `${progress}%`;
        }
    </script>
</body>
</html>
