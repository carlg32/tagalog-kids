<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tagalog Kids - Parent Dashboard</title>
  <link rel="stylesheet" href="css/slide-v2.css">
  <style>
    body { font-family: 'Nunito', sans-serif; padding: 20px; background: #f8f9fa; }
    .dashboard-container { max-width: 1100px; margin: 0 auto; }
    .header { text-align: center; margin-bottom: 20px; }
    .back-link {
      display: block;
      margin-top: 8px;
      color: #4A90E2;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.95rem;
    }
    .stats-bar {
      background: white;
      padding: 16px 24px;
      border-radius: 16px;
      display: flex;
      gap: 40px;
      margin-bottom: 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      justify-content: center;
    }
    .stat { text-align: center; }
    .stat-number { font-size: 1.6rem; font-weight: 800; color: #4A90E2; }
    .stat-label { font-size: 0.8rem; color: #666; }
    
    .category-card {
      background: white;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .category-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }
    .category-stats {
      font-size: 0.85rem;
      color: #666;
    }
    .word-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .word-chip {
      background: #f1f3f5;
      padding: 8px 16px;
      border-radius: 24px;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.2s ease;
    }
    .word-chip.excluded {
      background: #ffe3e3;
      text-decoration: line-through;
      opacity: 0.7;
    }
    .word-chip.mastered {
      background: #d4edda;
      border: 1px solid #7ED321;
    }
    .exclude-btn {
      background: #ff6b6b;
      color: white;
      border: none;
      border-radius: 50%;
      width: 22px;
      height: 22px;
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .search-bar {
      width: 100%;
      max-width: 400px;
      padding: 12px 20px;
      border: 2px solid #ddd;
      border-radius: 30px;
      font-size: 1rem;
      margin-bottom: 20px;
      display: block;
      margin-left: auto;
      margin-right: auto;
    }
    .filter-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      justify-content: center;
    }
    .filter-tab {
      padding: 6px 16px;
      border-radius: 20px;
      background: #eee;
      cursor: pointer;
      font-size: 0.85rem;
    }
    .filter-tab.active {
      background: #4A90E2;
      color: white;
    }
    .checkbox-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.9rem;
      cursor: pointer;
      user-select: none;
    }
  </style>
</head>
<body>
  <div class="dashboard-container">
    <div class="header">
      <h1>Parent Dashboard</h1>
      <a href="index.html" class="back-link">← Back to Start</a>
    </div>

    <div class="stats-bar">
      <div class="stat">
        <div class="stat-number" id="total-words">0</div>
        <div class="stat-label">Total Words</div>
      </div>
      <div class="stat">
        <div class="stat-number" id="excluded-count">0</div>
        <div class="stat-label">Excluded</div>
      </div>
      <div class="stat">
        <div class="stat-number" id="mastered-count">0</div>
        <div class="stat-label">Mastered</div>
      </div>
    </div>

    <div class="filter-tabs">
      <div class="filter-tab active" data-filter="all">All Words</div>
      <div class="filter-tab" data-filter="excluded">Excluded Only</div>
      <div class="filter-tab" data-filter="mastered">Mastered Only</div>
    </div>

    <input type="text" id="search" class="search-bar" placeholder="Search words...">

    <div id="categories-container"></div>
  </div>

  <script>
    const categories = [
      { file: 'numbers.json', name: 'Numbers' },
      { file: 'colors.json', name: 'Colors' },
      { file: 'food-and-dining.json', name: 'Food & Dining' },
      { file: 'animals.json', name: 'Animals' },
      { file: 'emotions.json', name: 'Emotions' },
      { file: 'time.json', name: 'Time' },
      { file: 'shapes.json', name: 'Shapes' },
      { file: 'family-and-people.json', name: 'Family & People' }
    ];

    let excludedWords = JSON.parse(localStorage.getItem('excludedWords') || '[]');
    let progress = JSON.parse(localStorage.getItem('tagalog-kids-progress') || '{}');
    let wordProgress = progress.words || {};
    let currentFilter = 'all';

    function saveScrollPosition() {
      return window.scrollY;
    }

    function restoreScrollPosition(y) {
      window.scrollTo(0, y);
    }

    async function loadDashboard(filterText = '', preserveScroll = false) {
      const scrollY = preserveScroll ? saveScrollPosition() : 0;
      const container = document.getElementById('categories-container');
      container.innerHTML = '';
      let total = 0;
      let mastered = 0;

      for (const cat of categories) {
        const res = await fetch(`data/${cat.file}`);
        const words = await res.json();
        total += words.length;

        let filteredWords = words.filter(w =>
          w.tagalog.toLowerCase().includes(filterText.toLowerCase()) ||
          w.english.toLowerCase().includes(filterText.toLowerCase())
        );

        if (currentFilter === 'excluded') {
          filteredWords = filteredWords.filter(w => excludedWords.includes(w.wordId));
        } else if (currentFilter === 'mastered') {
          filteredWords = filteredWords.filter(w => wordProgress[w.wordId]?.mastered);
        }

        if (filteredWords.length === 0) continue;

        const excludedInCat = words.filter(w => excludedWords.includes(w.wordId)).length;
        const masteredInCat = words.filter(w => wordProgress[w.wordId]?.mastered).length;
        const allExcluded = excludedInCat === words.length;

        const card = document.createElement('div');
        card.className = 'category-card';

        let html = `
          <div class="category-header">
            <div>
              <h3 style="margin:0">${cat.name}</h3>
              <div class="category-stats">
                ${words.length} total • ${excludedInCat} excluded • ${masteredInCat} mastered
              </div>
            </div>
            <label class="checkbox-label">
              <input type="checkbox" 
                     ${allExcluded ? 'checked' : ''} 
                     onchange="toggleExcludeAll('${cat.file}', this.checked)">
              Exclude All
            </label>
          </div>
          <div class="word-list">
        `;

        filteredWords.forEach(word => {
          const isExcluded = excludedWords.includes(word.wordId);
          const isMastered = wordProgress[word.wordId]?.mastered;
          if (isMastered) mastered++;

          let classes = 'word-chip';
          if (isExcluded) classes += ' excluded';
          if (isMastered) classes += ' mastered';

          html += `
            <div class="${classes}">
              ${word.tagalog} (${word.english})
              <button class="exclude-btn" onclick="toggleExclude('${word.wordId}', this)">×</button>
            </div>
          `;
        });

        html += `</div>`;
        card.innerHTML = html;
        container.appendChild(card);
      }

      document.getElementById('total-words').textContent = total;
      document.getElementById('excluded-count').textContent = excludedWords.length;
      document.getElementById('mastered-count').textContent = mastered;

      if (preserveScroll) {
        // Restore scroll after DOM update
        setTimeout(() => restoreScrollPosition(scrollY), 10);
      }
    }

    function toggleExclude(wordId, btn) {
      const scrollY = saveScrollPosition();
      const chip = btn.parentElement;
      if (excludedWords.includes(wordId)) {
        excludedWords = excludedWords.filter(id => id !== wordId);
        chip.classList.remove('excluded');
      } else {
        excludedWords.push(wordId);
        chip.classList.add('excluded');
      }
      localStorage.setItem('excludedWords', JSON.stringify(excludedWords));
      loadDashboard(document.getElementById('search').value, true);
    }

    function toggleExcludeAll(filename, shouldExclude) {
      const scrollY = saveScrollPosition();
      
      fetch(`data/${filename}`)
        .then(res => res.json())
        .then(words => {
          words.forEach(word => {
            if (shouldExclude && !excludedWords.includes(word.wordId)) {
              excludedWords.push(word.wordId);
            } else if (!shouldExclude) {
              excludedWords = excludedWords.filter(id => id !== word.wordId);
            }
          });
          localStorage.setItem('excludedWords', JSON.stringify(excludedWords));
          loadDashboard(document.getElementById('search').value, true);
        });
    }

    // Filter tabs
    document.querySelectorAll('.filter-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        currentFilter = tab.dataset.filter;
        loadDashboard(document.getElementById('search').value, true);
      });
    });

    // Search
    document.getElementById('search').addEventListener('input', (e) => {
      loadDashboard(e.target.value, true);
    });

    loadDashboard();
  </script>
</body>
</html>
